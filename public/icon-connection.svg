<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Minimal connection — nodes linked together -->
  <g stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.7">
    <!-- Connection lines -->
    <line x1="14" y1="14" x2="34" y2="14"/>
    <line x1="14" y1="14" x2="14" y2="34"/>
    <line x1="34" y1="14" x2="34" y2="34"/>
    <line x1="14" y1="34" x2="34" y2="34"/>
    <line x1="14" y1="14" x2="34" y2="34" opacity="0.3"/>
    <line x1="34" y1="14" x2="14" y2="34" opacity="0.3"/>
    <!-- Nodes -->
    <circle cx="14" cy="14" r="3" fill="white" opacity="0.5"/>
    <circle cx="34" cy="14" r="3" fill="white" opacity="0.5"/>
    <circle cx="14" cy="34" r="3" fill="white" opacity="0.4"/>
    <circle cx="34" cy="34" r="3" fill="white" opacity="0.4"/>
    <!-- Center node — the person -->
    <circle cx="24" cy="24" r="4" fill="white" opacity="0.6"/>
  </g>
</svg>
