<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Minimal compass — values/direction -->
  <g stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.7">
    <circle cx="24" cy="24" r="18"/>
    <circle cx="24" cy="24" r="12" stroke-width="0.5" opacity="0.3"/>
    <!-- Compass needle -->
    <polygon points="24,10 21,24 24,26 27,24" fill="white" stroke="none" opacity="0.6"/>
    <polygon points="24,38 21,24 24,22 27,24" fill="white" stroke="none" opacity="0.2"/>
    <!-- Cardinal dots -->
    <circle cx="24" cy="8" r="1" fill="white" opacity="0.5"/>
    <circle cx="40" cy="24" r="1" fill="white" opacity="0.3"/>
    <circle cx="24" cy="40" r="1" fill="white" opacity="0.3"/>
    <circle cx="8" cy="24" r="1" fill="white" opacity="0.3"/>
    <!-- Center -->
    <circle cx="24" cy="24" r="2" fill="white" opacity="0.4"/>
  </g>
</svg>
