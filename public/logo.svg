<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" height="160">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(200, 52)" filter="url(#glow)">
    <!-- Left arc -->
    <ellipse cx="-18" cy="0" rx="28" ry="20" fill="none" stroke="white" stroke-width="1.2" opacity="0.9"/>
    <!-- Right arc -->
    <ellipse cx="18" cy="0" rx="28" ry="20" fill="none" stroke="white" stroke-width="1.2" opacity="0.9"/>
    <!-- Center equilibrium point -->
    <circle cx="0" cy="0" r="2" fill="white" opacity="0.6"/>
    <!-- Thin horizontal balance line -->
    <line x1="-52" y1="0" x2="52" y2="0" stroke="white" stroke-width="0.4" opacity="0.2"/>
  </g>

  <!-- EQUILIBRA wordmark -->
  <text x="200" y="110" text-anchor="middle" fill="white"
        font-family="'Space Grotesk', sans-serif"
        font-weight="700" font-size="26" letter-spacing="12" opacity="0.95">EQUILIBRA</text>

  <!-- Thin accent line below wordmark -->
  <line x1="140" y1="125" x2="260" y2="125" stroke="white" stroke-width="0.5" opacity="0.15"/>
</svg>
